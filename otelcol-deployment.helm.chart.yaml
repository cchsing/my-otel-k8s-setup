mode: deployment
replicaCount: 1
image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib"
command:
  name: "otelcol-contrib"
hostNetwork: true

presets:
  clusterMetrics:
    enabled: true
  kubernetesEvents:
    enabled: true

config:
  exporters:
    splunk_hec:
      token: "6e8749fe-1fcc-4bd6-aebd-762871effc72"
      endpoint: "https://192.168.1.102:8088/services/collector"
      tls:
        insecure_skip_verify: true
  service:
    pipelines:
      logs:
        exporters:
          - splunk_hec
      traces:
        exporters:
          - splunk_hec
      metrics:
        exporters:
          - splunk_hec