apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deployment-otelcol-collector
  namespace: opentelemetry
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deployment-otelcol-collector
  namespace: opentelemetry
subjects:
  - kind: ServiceAccount
    name: deployment-otelcol-collector
    namespace: opentelemetry
roleRef:
  kind: ClusterRole
  name: deployment-otelcol-collector
  apiGroup: rbac.authorization.k8s.io