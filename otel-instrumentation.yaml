# instrumentation.yaml
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: otel-instrumentation
  namespace: opentelemetry
spec:
  # Global configuration
  exporter:
    endpoint: http://deployment-otelcol-collector.opentelemetry.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "0.25"

  # Python auto-instrumentation
  python:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
    env:
      # Python auto-instrumentation uses OTLP/HTTP by default.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://deployment-otelcol-collector.opentelemetry.svc.cluster.local:4318
      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "true"

